name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0
  RUST_BACKTRACE: short
  RUST_MIN_STACK: 16777216
  PDFIUM_VERSION: "7678"
  PDFIUM_STATIC_VERSION: "7678"
  ORT_VERSION: "1.24.2"
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  BUILD_PROFILE: "ci"

permissions:
  contents: read

jobs:
  validate-rust:
    name: "Validate: Rust"
    if: github.repository == 'kreuzberg-dev/kreuzberg-lts' && github.actor != 'dependabot[bot]'
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Free disk space before setup
        uses: xberg-io/actions/free-disk-space-linux@v1
        with:
          show-initial: "false"
          show-final: "true"

      - name: Setup Rust
        uses: xberg-io/actions/setup-rust@v1
        with:
          cache-key-prefix: validate-rust
          use-sccache: "true"

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Install Task
        uses: xberg-io/actions/install-task@v1

      - name: Install poly
        uses: Goldziher/poly@v0

      - name: Run poly format check
        run: poly fmt --check .

      - name: Run poly lint
        run: poly lint .

      - name: Run Rust lint checks
        run: task rust:lint:check

      - name: Run C lint checks
        run: task c:lint:check

      - name: Check final disk space
        if: always()
        run: scripts/ci/validate/show-disk-space.sh "Final disk space"
        shell: bash

      - name: Cleanup build artifacts after lint
        if: always()
        run: scripts/ci/validate/cleanup-after-lint.sh
        shell: bash

  rust-tests:
    needs: [validate-rust]
    name: "Test: Rust (${{ matrix.os }})"
    if: github.repository == 'kreuzberg-dev/kreuzberg-lts' && github.actor != 'dependabot[bot]'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 180
    permissions:
      contents: read
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v6
        id: checkout

      - name: Install system dependencies
        uses: ./.github/actions/install-system-deps

      - name: Free disk space before setup
        if: startsWith(matrix.os, 'ubuntu')
        uses: xberg-io/actions/free-disk-space-linux@v1
        with:
          show-initial: "true"
          show-final: "true"

      - name: Cache Hugging Face models (fastembed)
        uses: ./.github/actions/cache-hf-fastembed

      - name: Setup Rust
        uses: xberg-io/actions/setup-rust@v1
        with:
          cache-key-prefix: rust-tests-${{ matrix.os }}
          target: ${{ matrix.target }}
          use-sccache: "true"
          report-stats: "true"

      - name: Cache PDFium
        uses: ./.github/actions/cache-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Download PDFium
        uses: ./.github/actions/download-pdfium
        with:
          pdfium-version: ${{ env.PDFIUM_VERSION }}

      - name: Stage PDFium runtime
        uses: ./.github/actions/stage-pdfium-runtime
        with:
          destination: target/release

      - name: Configure bindgen compatibility headers (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: scripts/ci/rust/configure-bindgen-windows.ps1

      - name: Setup ONNX Runtime
        uses: ./.github/actions/setup-onnx-runtime
        with:
          ort-version: ${{ env.ORT_VERSION }}

      - name: Setup Layout Models
        uses: ./.github/actions/setup-layout-models

      - name: Configure Tesseract data path
        shell: bash
        run: scripts/ci/rust/setup-tessdata-env.sh

      - name: Pre-build diagnostics
        shell: bash
        run: scripts/ci/rust/pre-build-diagnostics.sh

      - name: Install Task
        uses: xberg-io/actions/install-task@v1

      - name: Run unit tests
        run: task rust:test:ci
        shell: bash
        env:
          LD_LIBRARY_PATH: ${{ env.LD_LIBRARY_PATH || '' }}
          DYLD_LIBRARY_PATH: ${{ env.DYLD_LIBRARY_PATH || '' }}
          DYLD_FALLBACK_LIBRARY_PATH: ${{ env.DYLD_FALLBACK_LIBRARY_PATH || '' }}

      - name: Run E2E tests
        if: matrix.os == 'ubuntu-latest'
        env:
          TESSDATA_PREFIX: "/usr/share/tesseract-ocr/5/tessdata"
          LD_LIBRARY_PATH: "${{ github.workspace }}/target/release:${{ env.LD_LIBRARY_PATH || '' }}"
          DYLD_LIBRARY_PATH: "${{ github.workspace }}/target/release:${{ env.DYLD_LIBRARY_PATH || '' }}"
        run: task rust:e2e:test
        shell: bash

      - name: Cleanup Rust cache
        if: always() && steps.checkout.outcome == 'success'
        uses: xberg-io/actions/cleanup-rust-cache@v1
