name: Publish Helm Chart

on:
  # Invoked by publish-docker.yaml after the images are pushed, so the chart ~keep
  # (and its Artifact Hub metadata) is only published once the images it ~keep
  # references exist — avoids the Artifact Hub image-scan race. ~keep
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build (e.g., v4.3.6)"
        required: true
        type: string
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g., v4.3.6)"
        required: true
        type: string
      dry_run:
        description: "Prepare artifacts without publishing"
        required: false
        type: boolean
        default: false
  repository_dispatch:
    types: [publish-helm]

concurrency:
  group: ${{ github.workflow }}-helm-${{ inputs.tag || github.ref || github.run_id }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish-helm:
    name: Publish Helm chart to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # keyless cosign signing via OIDC ~keep
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve version
        id: meta
        run: |
          # workflow_call and workflow_dispatch both populate inputs.tag;
          # repository_dispatch carries it in the client payload. ~keep
          if [[ -n "${{ inputs.tag }}" ]]; then
            TAG="${{ inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            TAG="${{ github.event.client_payload.tag }}"
          fi

          if [[ -z "${TAG}" ]]; then
            echo "No release tag resolved" >&2
            exit 1
          fi

          VERSION="${TAG#v}"
          DRY_RUN="${{ inputs.dry_run || 'false' }}"

          {
            echo "tag=${TAG}"
            echo "version=${VERSION}"
            echo "dry_run=${DRY_RUN}"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Helm Publish Metadata"
            echo "- **Tag**: \`${TAG}\`"
            echo "- **Version**: \`${VERSION}\`"
            echo "- **Dry Run**: \`${DRY_RUN}\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint --strict charts/kreuzberg/

      - name: Update Chart.yaml version
        run: |
          sed -i "s/^version:.*/version: ${{ steps.meta.outputs.version }}/" charts/kreuzberg/Chart.yaml
          sed -i "s/^appVersion:.*/appVersion: \"${{ steps.meta.outputs.version }}\"/" charts/kreuzberg/Chart.yaml
          {
            echo "### Chart.yaml"
            echo '```yaml'
            cat charts/kreuzberg/Chart.yaml
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Package chart
        run: |
          helm package charts/kreuzberg/ --destination .helm-packages/
          echo "### Packaged" >> "$GITHUB_STEP_SUMMARY"
          ls -lh .helm-packages/ >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GitHub Container Registry
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push chart to GHCR
        id: push
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        run: |
          helm push .helm-packages/kreuzberg-${{ steps.meta.outputs.version }}.tgz oci://ghcr.io/kreuzberg-dev/charts 2>&1 | tee push.log
          DIGEST="$(grep -oE 'sha256:[0-9a-f]{64}' push.log | head -n1)"
          if [[ -z "${DIGEST}" ]]; then
            echo "Failed to resolve pushed chart digest" >&2
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "### Published" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart pushed to \`oci://ghcr.io/kreuzberg-dev/charts/kreuzberg:${{ steps.meta.outputs.version }}\` (\`${DIGEST}\`)" >> "$GITHUB_STEP_SUMMARY"

      - name: Install cosign
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        uses: sigstore/cosign-installer@v3

      - name: Sign chart with cosign (keyless)
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        # Keyless OIDC signature. Artifact Hub auto-detects the cosign signature ~keep
        # tag on the OCI chart and shows the "Signed" badge. Verify with cosign ~keep
        # verify using certificate-identity-regexp against the repo and the ~keep
        # GitHub Actions OIDC issuer token.actions.githubusercontent.com. ~keep
        run: |
          cosign sign --yes \
            "ghcr.io/kreuzberg-dev/charts/kreuzberg@${{ steps.push.outputs.digest }}"
          echo "### Signed" >> "$GITHUB_STEP_SUMMARY"
          echo "Chart signed with cosign (keyless) at \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Set up ORAS
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        uses: oras-project/setup-oras@v1

      - name: Push Artifact Hub repository metadata
        if: ${{ steps.meta.outputs.dry_run != 'true' }}
        # Artifact Hub reads artifacthub-repo.yml for OCI repos from a metadata ~keep
        # artifact tagged `artifacthub.io`; this grants the Verified Publisher badge. ~keep
        run: |
          oras push ghcr.io/kreuzberg-dev/charts/kreuzberg:artifacthub.io \
            --config /dev/null:application/vnd.cncf.artifacthub.repository-metadata.config.v1+yaml \
            charts/kreuzberg/artifacthub-repo.yml:application/vnd.cncf.artifacthub.repository-metadata.layer.v1.yaml

      - name: Dry-run summary
        if: ${{ steps.meta.outputs.dry_run == 'true' }}
        run: |
          echo "### Dry Run" >> "$GITHUB_STEP_SUMMARY"
          echo "Would have pushed \`kreuzberg-${{ steps.meta.outputs.version }}.tgz\` to \`oci://ghcr.io/kreuzberg-dev/charts\`" >> "$GITHUB_STEP_SUMMARY"
