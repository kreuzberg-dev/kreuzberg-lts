[build]
rustflags = ["-A", "unpredictable-function-pointer-comparisons", "-A", "fn_ptr_eq"]

[target.x86_64-pc-windows-gnu]
rustflags = [
    "-A",
    "unpredictable-function-pointer-comparisons",
    "-A",
    "fn_ptr_eq",
    "-C",
    "link-arg=-lbcrypt",
    "-C",
    "link-arg=-lcrypt32",
    "-C",
    "link-arg=-lws2_32",
    "-C",
    "link-arg=-luserenv",
]

[target.x86_64-pc-windows-msvc]
rustflags = ["-A", "unpredictable-function-pointer-comparisons", "-A", "fn_ptr_eq"]
