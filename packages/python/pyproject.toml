[build-system]
build-backend = "maturin"
requires = ["maturin>=1,<2"]

[project]
name = "kreuzberg"
version = "4.10.2"
description = """\
  High-performance document intelligence library for Python. Extract text, metadata, and structured data from PDFs, \
  Office documents, images, and 88+ formats. Powered by Rust core for 10-50x speed improvements.\
  """
readme = "README.md"
keywords = [
    "document-extraction",
    "document-intelligence",
    "document-parsing",
    "document-processing",
    "docx",
    "easyocr",
    "email-parsing",
    "html",
    "markdown",
    "metadata-extraction",
    "ocr",
    "office-documents",
    "pdf",
    "pdf-extraction",
    "performance",
    "pptx",
    "rust",
    "table-extraction",
    "tesseract",
    "text-extraction",
    "xlsx",
    "xml",
]
license = { text = "MIT" }
maintainers = [{ name = "Na'aman Hirschfeld", email = "naaman@kreuzberg.dev" }]
authors = [{ name = "Na'aman Hirschfeld", email = "naaman@kreuzberg.dev" }]
requires-python = ">=3.10"
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: Information Technology",
    "Intended Audience :: Science/Research",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
    "Programming Language :: Python :: 3 :: Only",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: 3.14",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
    "Topic :: Office/Business",
    "Topic :: Scientific/Engineering :: Information Analysis",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: Text Processing",
    "Topic :: Text Processing :: Filters",
    "Topic :: Text Processing :: General",
    "Typing :: Typed",
]
dependencies = []
optional-dependencies.all = ["kreuzberg[easyocr]", "kreuzberg[tesseract]"]
optional-dependencies.easyocr = ["easyocr>=1.7.2", "torch>=2.9.1"]
optional-dependencies.tesseract = []
urls.Changelog = "https://kreuzberg.dev/CHANGELOG/"
urls.Documentation = "https://kreuzberg.dev"
urls.Homepage = "https://kreuzberg.dev"
urls.Issues = "https://github.com/kreuzberg-dev/kreuzberg-lts/issues"
urls.Repository = "https://github.com/kreuzberg-dev/kreuzberg-lts"
urls.Source = "https://github.com/kreuzberg-dev/kreuzberg-lts"
scripts.kreuzberg = "kreuzberg.__main__:main"

[tool.maturin]
module-name = "kreuzberg._internal_bindings"
manifest-path = "../../crates/kreuzberg-py/Cargo.toml"
include = [
    { path = "kreuzberg/_internal_bindings.pyi", format = [
        "wheel",
        "sdist",
    ] },
    { path = "kreuzberg/py.typed", format = [
        "wheel",
        "sdist",
    ] },
]

[tool.pyrefly]
python-version = "3.10"
preset = "strict"
project-includes = ["kreuzberg"]

[tool.pyrefly.errors]
# The compiled `_internal_bindings` Rust extension re-exports its types through
# `__init__.py`; the static checker resolves them via the generated `.pyi` stub,
# whose runtime re-exports and 3.11+ typing constructs (StrEnum, Self) trip these
# categories even though pyo3 reconciles them at runtime. The Python e2e suite
# exercises the real path. `missing-override-decorator` was not enforced by the
# prior mypy config either.
bad-dunder-all = false
missing-module-attribute = false
missing-override-decorator = false

[[tool.pyrefly.sub-config]]
# OCR backends import heavy optional deps (pdf2image, PyMuPDF/fitz) lazily inside
# functions; they are not installed in the type-check environment, and PIL's
# stubs are imprecise for `Image.frombytes`.
matches = "**/ocr/*.py"
[tool.pyrefly.sub-config.errors]
missing-import = false
bad-argument-type = false

[tool.pytest]
ini_options.addopts = "--doctest-modules"
ini_options.markers = [
    "cli_features: marks tests that require CLI binary built with --features all (deselect with '-m \"not cli_features\"')",
    "integration: marks tests as integration tests (requires running services)",
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "windows_slow: marks tests as too slow on Windows CI (deselect with '-m \"not windows_slow\"')",
]
ini_options.asyncio_mode = "auto"
ini_options.timeout = 60
ini_options.timeout_func_only = true
ini_options.timeout_method = "thread"
