[package]
name = "kreuzberg_rustler"
version = "4.10.0"
edition = "2024"
license = "MIT"
description = "Elixir bindings for Kreuzberg document intelligence library"
repository = "https://github.com/kreuzberg-dev/kreuzberg-lts"

[lib]
name = "kreuzberg_rustler"
crate-type = ["cdylib"]

[features]
keywords-yake = ["kreuzberg/keywords-yake"]
keywords-rake = ["kreuzberg/keywords-rake"]
pdf = ["kreuzberg/pdf"]

[dependencies]
kreuzberg = { workspace = true, features = ["bundled-pdfium", "full"] }

rustler = { version = "0.38" }
serde_json = "1.0"
tracing = { workspace = true }
