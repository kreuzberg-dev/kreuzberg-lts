
[target.wasm32-unknown-unknown]
# Link args (-zstack-size, --allow-multiple-definition) are emitted from build.rs
# instead of here: CI sets RUSTFLAGS=-D warnings, which fully overrides config
# rustflags, so config-based link args are silently dropped in CI. Only the
# compile-time cfg remains here (build scripts cannot inject a dependency's cfg).
rustflags = ["--cfg", "getrandom_backend=\"wasm_js\""]
