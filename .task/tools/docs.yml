version: "3"

tasks:
  build:
    desc: Build documentation
    cmds:
      - pnpm --dir docs-site install --frozen-lockfile
      - pnpm --dir docs-site build

  build:strict:
    desc: Build documentation (CI-equivalent; astro build fails on errors)
    cmds:
      - pnpm --dir docs-site install --frozen-lockfile
      - pnpm --dir docs-site build

  serve:
    desc: Serve documentation locally with live reload
    cmds:
      - pnpm --dir docs-site install
      - pnpm --dir docs-site dev

  lint:links:
    desc: Check links with lychee (against the built site so Starlight route slugs resolve)
    deps:
      - build
    cmds:
      - lychee --offline --root-dir "{{.ROOT_DIR}}/docs-site/dist" 'docs-site/dist/**/*.html'
      - lychee --offline README.md

  lint:prose:
    desc: Lint prose with textlint
    cmds:
      - npx textlint 'docs-site/src/content/docs/**/*.{md,mdx}'

  generate-readme:
    desc: Generate and format language package READMEs from templates
    cmds:
      - python3 scripts/generate_readme.py
      - rumdl fmt packages/python/README.md v4/README.md packages/java/README.md packages/php/README.md packages/ruby/README.md packages/csharp/README.md packages/elixir/README.md crates/kreuzberg-node/README.md crates/kreuzberg-wasm/README.md

  generate-readme:check:
    desc: Validate READMEs match templates (CI mode)
    cmds:
      - python3 scripts/generate_readme.py --validate

  generate-readme:dry-run:
    desc: Preview README generation without writing files
    cmds:
      - python3 scripts/generate_readme.py --dry-run
