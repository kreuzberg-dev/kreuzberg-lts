
[build]
incremental = true

[target.x86_64-unknown-linux-gnu]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# NOTE: For cross-compilation to aarch64-unknown-linux-gnu from x86_64,

[target.x86_64-pc-windows-msvc]

[target.x86_64-pc-windows-gnu]
# NOTE: Windows GNU target has a known issue with linker arg CRLF handling
linker = "gcc"
ar = "ar"

[target.wasm32-unknown-unknown]
rustflags = ["-C", "target-feature=+bulk-memory", "--cfg", "getrandom_backend=\"wasm_js\""]


[net]
git-fetch-with-cli = true

[registries.crates-io]
protocol = "sparse"
