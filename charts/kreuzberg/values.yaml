replicaCount: 2

image:
  registry: ghcr.io
  repository: kreuzberg-dev/kreuzberg-full
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: kreuzberg.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

extraEnv: []

kreuzberg:
  logLevel: "info"
  tessdataPrefix: "/usr/share/tesseract-ocr/5/tessdata"
  ocrLanguage: "eng"

cache:
  enabled: true
  size: 2Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

podDisruptionBudget:
  enabled: false
  minAvailable: 1
