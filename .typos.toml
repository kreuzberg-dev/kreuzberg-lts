
[default]
extend-ignore-re = [
    "[a-fA-F0-9]{32,}",
    "[A-Za-z0-9+/]{40,}={0,2}",
    "https?://[^\\s]+",
    "fo:[a-z-]+",
    "xsl-fo-compatible",
    "'\\\\u\\{[0-9a-fA-F]+\\}'",
    '"[^"]*(?:programa|cursos|ist ein|künstliche|excepcional|utiliza|transforme|Exemple|Dies ist|internacional|Hauptstadt)[^"]*"',
    "runner-gpu-l4",
]

